<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker - Premium Edition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="card">
    <h1>ELITE STUDY TRACKER</h1>

    <p style="text-align: center; color: rgba(255, 255, 255, 0.7); margin-bottom: 30px; font-size: 15px;">
        AI-powered personalized study planning for board & competitive exams
    </p>

    <input type="email" id="email" placeholder="Email Address" required>
    <input type="password" id="password" placeholder="Password" required>

    <button onclick="login()">LOGIN</button>
    <button onclick="signup()" style="background: linear-gradient(135deg, #3b82f6, #2563eb); box-shadow: 0 5px 20px rgba(59, 130, 246, 0.2); margin-top: 8px;">CREATE ACCOUNT</button>
    
    <p style="text-align: center; margin-top: 30px; color: rgba(255, 255, 255, 0.55); font-size: 12px; line-height: 1.8;">
        Secure, AI-powered study tracking<br>
        Personalized plans for JEE, CBSE, ICSE<br>
        Real-time performance analytics
    </p>
</div>

<script src="script.js"></script>

</body>
</html>
