<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f172a 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        /* ===== HEADER ===== */
        .chat-header {
            background: linear-gradient(135deg, #10b981, #06d6a0);
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(16, 185, 129, 0.3);
        }

        .chat-header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .chat-header p {
            font-size: 13px;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* ===== MESSAGES AREA ===== */
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        #chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        #chat-messages::-webkit-scrollbar-thumb {
            background: rgba(16, 185, 129, 0.5);
            border-radius: 10px;
        }

        #chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(16, 185, 129, 0.8);
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: rgba(59, 130, 246, 0.3);
            border: 1px solid #3b82f6;
        }

        .message.ai .message-avatar {
            background: rgba(16, 185, 129, 0.3);
            border: 1px solid #10b981;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(37, 99, 235, 0.2));
            border: 1px solid rgba(59, 130, 246, 0.4);
            color: #ffffff;
        }

        .message.ai .message-content {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(6, 214, 160, 0.15));
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #e0f2fe;
        }

        .message-image {
            max-width: 300px;
            border-radius: 8px;
            margin-top: 8px;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 5px;
        }

        /* ===== INPUT AREA ===== */
        .input-area {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-field {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 12px 15px;
            color: white;
            font-size: 14px;
            min-height: 40px;
            max-height: 100px;
            resize: vertical;
            font-family: inherit;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .input-field:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .btn-send {
            background: linear-gradient(135deg, #10b981, #06d6a0);
            color: white;
        }

        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }

        .btn-send:active {
            transform: translateY(0);
        }

        .btn-upload {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .btn-upload:hover {
            background: rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.6);
        }

        #file-input {
            display: none;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            30% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        .nav-footer {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .nav-footer a {
            color: #10b981;
            text-decoration: none;
            font-size: 13px;
            margin: 0 10px;
            transition: color 0.3s;
        }

        .nav-footer a:hover {
            color: #06d6a0;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .message-content {
                max-width: 100%;
            }

            .chat-header h1 {
                font-size: 22px;
            }

            .message-image {
                max-width: 200px;
            }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            opacity: 0.6;
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.7);
        }

        .empty-state p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <h1>💬 AI Study Chat</h1>
            <p>Your personal AI study assistant - Get personalized advice anytime</p>
        </div>

        <!-- Messages Area -->
        <div id="chat-messages">
            <div class="empty-state">
                <h2>Welcome to AI Study Chat!</h2>
                <p>Ask me anything about studying, subjects, or exam preparation</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea 
                    id="chat-input" 
                    class="input-field" 
                    placeholder="Type your question here... (Press Shift+Enter for new line, Enter to send)"
                    rows="1"
                ></textarea>
                <div class="button-group">
                    <button class="btn btn-upload" onclick="document.getElementById('file-input').click()" title="Upload image">
                        📎
                    </button>
                    <button class="btn btn-send" onclick="sendChat()">
                        Send
                    </button>
                </div>
                <input type="file" id="file-input" accept="image/*" onchange="handleImageUpload(event)">
            </div>
        </div>

        <!-- Footer -->
        <div class="nav-footer">
            <a href="dashboard.html">Dashboard</a> | 
            <a href="entry.html">Add Data</a> | 
            <a href="goals.html">Change Goal</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');

        // Auto-expand textarea
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // Enter to send, Shift+Enter for new line
        chatInput.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendChat();
            }
        });

        // Clear empty state on first message
        function clearEmptyState() {
            const emptyState = chatMessages.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
        }

        async function sendChat() {
            const message = chatInput.value.trim();
            if (!message) return;

            clearEmptyState();
            addChatMessage('You', message);
            chatInput.value = '';
            chatInput.style.height = 'auto';

            // Show typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const goal = getCurrentGoal();
                const logs = JSON.parse(localStorage.getItem("logs")) || [];

                const response = await fetch('https://study-yxi5.onrender.com/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message,
                        goal: goal ? goal.name : 'General',
                        logs
                    })
                });

                typingDiv.remove();

                if (response.ok) {
                    const data = await response.json();
                    addChatMessage('AI Coach', data.response);
                } else {
                    addChatMessage('AI Coach', `⚠️ Error: API returned ${response.status}. Please try again.`);
                }
            } catch (error) {
                typingDiv.remove();
                console.error('Chat error:', error);
                addChatMessage('AI Coach', `❌ Connection error: ${error.message}`);
            }
        }

        function addChatMessage(sender, message) {
            clearEmptyState();
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender === 'You' ? 'user' : 'ai'}`;

            const avatar = sender === 'You' ? '👤' : '🤖';
            const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });

            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div>
                    <div class="message-content">${message}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                clearEmptyState();
                
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message user';
                const time = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });

                messageDiv.innerHTML = `
                    <div class="message-avatar">👤</div>
                    <div>
                        <div class="message-content">
                            <img src="${e.target.result}" class="message-image" alt="Uploaded image">
                        </div>
                        <div class="message-time">${time}</div>
                    </div>
                `;

                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;

                // Reset file input
                event.target.value = '';

                // Add context message
                addChatMessage('You', '📸 Image uploaded. What would you like me to help with?');
            };
            reader.readAsDataURL(file);
        }

        // Load page
        window.addEventListener('DOMContentLoaded', function() {
            // Initialize with welcome message from AI
            setTimeout(() => {
                addChatMessage('AI Coach', "👋 Hello! I'm your AI study assistant. I'm here to help you with exam preparation, study strategies, subject-specific questions, and more. Feel free to ask me anything about your studies!");
            }, 500);
        });
    </script>
</body>
</html>
