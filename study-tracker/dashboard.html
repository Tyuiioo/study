<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="card">
    <h1>STUDY DASHBOARD</h1>

    <p id="currentGoal"></p>

    <p id="todayScore">Today's Score: --</p>

    <!-- Progress Bar -->
    <div class="progress-container">
        <div id="progressBar"></div>
    </div>

    <!-- Streak & Goal Info -->
    <p id="streak">STREAK: 0 days</p>
    <p id="goalMsg">Loading...</p>
    <p id="weeklyAvg">Weekly Avg: --</p>

    <!-- Chart -->
    <canvas id="myChart" style="max-height: 280px;"></canvas>

    <div class="nav">
        <a href="entry.html">ADD DATA</a>
        <a href="chat.html">💬 AI CHAT</a>
        <a href="history.html">HISTORY</a>
        <a href="goals.html">CHANGE GOAL</a>
    </div>
</div>

<script src="script.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', function() {
        loadDashboard();
        setTimeout(loadChart, 100);
    });
</script>
</html>
